<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyLearn AI Assistant</title>
    
    <!-- Bootstrap 5.3 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Font (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Simple Modern Header Navbar -->
    <nav class="navbar navbar-dark py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold d-flex align-items-center mb-0">
                <i class="bi bi-mortarboard-fill me-2 text-warning fs-3"></i>
                <span>Easy Learn Academy</span>
            </span>
            <div class="d-flex align-items-center gap-3">
                <span class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="small fw-semibold text-accent">AI Online</span>
                </span>
                <button class="btn btn-sm btn-clear fw-bold" id="btn-clear" type="button">
                    <i class="bi bi-trash3-fill me-1"></i> Clear Timeline
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container my-auto py-4 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="w-100" style="max-width: 900px;">
            <div class="card border-0 shadow-lg chat-card overflow-hidden">
                
                <!-- Chat Window Sub-Header -->
                <div class="chat-card-header p-3 border-bottom d-flex align-items-center gap-2">
                    <div class="bot-avatar d-flex align-items-center justify-content-center">
                        <i class="bi bi-robot fs-5"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0 text-white">EasyLearn AI Student Assistant</h6>
                        <small class="text-white-50">Local Knowledge Base V2.0</small>
                    </div>
                </div>
                
                <!-- Chat Message Feed Area -->
                <div class="card-body overflow-y-auto" id="chat-feed" style="height: 420px;">
                    <!-- Default Greeting message bubble -->
                    <div class="d-flex mb-4 bot-row">
                        <div class="bot-avatar me-2 d-flex align-items-center justify-content-center">
                            <i class="bi bi-robot fs-6"></i>
                        </div>
                        <div class="rounded-3 p-3 bot-bubble text-white shadow-sm" style="max-width: 80%;">
                            <div class="fw-bold text-accent mb-1">Bot</div>
                            <div>Hello! Welcome to Easy Learn Academy. How can I help you today?</div>
                        </div>
                    </div>
                </div>
                
                <!-- Chat Input area footer -->
                <div class="chat-card-footer p-3 border-top">
                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control py-3" placeholder="Ask about python fees, mern syllabus, timing, placement...">
                        <button class="btn btn-send px-4 fw-bold" id="btn-send" type="button">
                            Send <i class="bi bi-send-fill ms-1"></i>
                        </button>
                    </div>
                    <div class="text-center mt-2">
                        <small class="text-white-50 text-xs"><i class="bi bi-info-circle me-1"></i> Designed for IT Students. Serves responses offline directly from local files.</small>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-3 text-center border-top">
        <div class="container">
            <span class="text-white-50 small">&copy; 2026 Easy Learn Academy - Bhavnagar. All rights reserved.</span>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
